x-service-base: &service-base
  build:
    context: .
    target: dev
  volumes:
    - ./packages:/app/packages
    - ./apps:/app/apps
    - ./scripts:/app/scripts
    - ./tsconfig.json:/app/tsconfig.json
    - brain-data:/app/data
  env_file: .env
  restart: unless-stopped
  networks:
    - brain

services:
  api-gateway:
    <<: *service-base
    container_name: brain-api-gateway
    command: yarn tsx watch apps/api-gateway/src/main.ts
    ports:
      - '3000:3000'
    environment:
      - DATABASE_PATH=./data/api-gateway.sqlite
      - MARKET_DISCOVERY_HOST=market-discovery
      - PRICE_FEED_HOST=price-feed
      - ORDERBOOK_HOST=orderbook
      - FEATURE_ENGINE_HOST=feature-engine
      - RISK_HOST=risk-service
      - EXECUTION_HOST=execution
      - CONFIG_HOST=config
      - AGENT_GATEWAY_HOST=agent-gateway
      - REPLAY_HOST=replay
      - WHALE_TRACKER_HOST=whale-tracker
      - POST_TRADE_ANALYZER_HOST=post-trade-analyzer
      - STRATEGY_OPTIMIZER_HOST=strategy-optimizer
      - DERIVATIVES_FEED_HOST=derivatives-feed
      - PIPELINE_HOST=pipeline-orchestrator
    depends_on:
      - market-discovery
      - price-feed
      - orderbook
      - feature-engine
      - agent-gateway
      - risk-service
      - execution
      - config
      - replay
      - post-trade-analyzer
      - strategy-optimizer

  market-discovery:
    <<: *service-base
    container_name: brain-market-discovery
    command: yarn tsx watch apps/market-discovery-service/src/main.ts
    ports:
      - '3001:3001'
    environment:
      - DATABASE_PATH=./data/market-discovery.sqlite
    depends_on:
      - config

  price-feed:
    <<: *service-base
    container_name: brain-price-feed
    command: yarn tsx watch apps/price-feed-service/src/main.ts
    ports:
      - '3002:3002'
    environment:
      - DATABASE_PATH=./data/price-feed.sqlite

  orderbook:
    <<: *service-base
    container_name: brain-orderbook
    command: yarn tsx watch apps/orderbook-service/src/main.ts
    ports:
      - '3003:3003'
    environment:
      - DATABASE_PATH=./data/orderbook.sqlite
      - MARKET_DISCOVERY_HOST=market-discovery
    depends_on:
      - market-discovery

  feature-engine:
    <<: *service-base
    container_name: brain-feature-engine
    command: yarn tsx watch apps/feature-engine-service/src/main.ts
    ports:
      - '3004:3004'
    environment:
      - DATABASE_PATH=./data/feature-engine.sqlite
      - MARKET_SERVICE_URL=http://market-discovery:3001
      - PRICE_SERVICE_URL=http://price-feed:3002
      - BOOK_SERVICE_URL=http://orderbook:3003
      - WHALE_SERVICE_URL=http://whale-tracker:3010
      - DERIVATIVES_SERVICE_URL=http://derivatives-feed:3013
    depends_on:
      - market-discovery
      - price-feed
      - orderbook
      - whale-tracker
      - derivatives-feed

  agent-gateway:
    <<: *service-base
    container_name: brain-agent-gateway
    command: yarn tsx watch apps/agent-gateway-service/src/main.ts
    ports:
      - '3008:3008'
    environment:
      - DATABASE_PATH=./data/agent-gateway.sqlite

  risk-service:
    <<: *service-base
    container_name: brain-risk
    command: yarn tsx watch apps/risk-service/src/main.ts
    ports:
      - '3005:3005'
    environment:
      - DATABASE_PATH=./data/risk.sqlite
      - EXECUTION_SERVICE_URL=http://execution:3006

  execution:
    <<: *service-base
    container_name: brain-execution
    command: yarn tsx watch apps/execution-service/src/main.ts
    ports:
      - '3006:3006'
    environment:
      - DATABASE_PATH=./data/execution.sqlite
      - PRICE_SERVICE_URL=http://price-feed:3002
      - POST_TRADE_ANALYZER_URL=http://post-trade-analyzer:3011
    depends_on:
      - price-feed

  config:
    <<: *service-base
    container_name: brain-config
    command: yarn tsx watch apps/config-service/src/main.ts
    ports:
      - '3007:3007'
    environment:
      - DATABASE_PATH=./data/config.sqlite

  derivatives-feed:
    <<: *service-base
    container_name: brain-derivatives-feed
    command: yarn tsx watch apps/derivatives-feed-service/src/main.ts
    ports:
      - '3013:3013'
    environment:
      - DATABASE_PATH=./data/derivatives-feed.sqlite

  whale-tracker:
    <<: *service-base
    container_name: brain-whale-tracker
    command: yarn tsx watch apps/whale-tracker-service/src/main.ts
    ports:
      - '3010:3010'
    environment:
      - DATABASE_PATH=./data/whale-tracker.sqlite
      - PRICE_SERVICE_URL=http://price-feed:3002
    depends_on:
      - price-feed

  post-trade-analyzer:
    <<: *service-base
    container_name: brain-post-trade-analyzer
    command: yarn tsx watch apps/post-trade-analyzer-service/src/main.ts
    ports:
      - '3011:3011'
    environment:
      - DATABASE_PATH=./data/post-trade-analyzer.sqlite
      - EXECUTION_SERVICE_URL=http://execution:3006
      - FEATURE_ENGINE_URL=http://feature-engine:3004
      - AGENT_GATEWAY_URL=http://agent-gateway:3008
      - RISK_SERVICE_URL=http://risk-service:3005
      - MARKET_DISCOVERY_URL=http://market-discovery:3001
    depends_on:
      - execution
      - feature-engine
      - agent-gateway
      - risk-service
      - market-discovery

  strategy-optimizer:
    <<: *service-base
    container_name: brain-strategy-optimizer
    command: yarn tsx watch apps/strategy-optimizer-service/src/main.ts
    ports:
      - '3012:3012'
    environment:
      - DATABASE_PATH=./data/strategy-optimizer.sqlite
      - POST_TRADE_ANALYZER_URL=http://post-trade-analyzer:3011
      - EXECUTION_SERVICE_URL=http://execution:3006
      - RISK_SERVICE_URL=http://risk-service:3005
      - CONFIG_SERVICE_URL=http://config:3007
      - OPTIMIZER_INTERVAL_MS=86400000
    depends_on:
      - post-trade-analyzer
      - execution
      - config

  replay:
    <<: *service-base
    container_name: brain-replay
    command: yarn tsx watch apps/replay-service/src/main.ts
    ports:
      - '3009:3009'
    environment:
      - DATABASE_PATH=./data/replay.sqlite

  pipeline-orchestrator:
    <<: *service-base
    container_name: brain-pipeline-orchestrator
    command: yarn tsx watch apps/pipeline-orchestrator/src/main.ts
    ports:
      - '3014:3014'
    environment:
      - FEATURE_ENGINE_URL=http://feature-engine:3004
      - AGENT_GATEWAY_URL=http://agent-gateway:3008
      - RISK_SERVICE_URL=http://risk-service:3005
      - EXECUTION_SERVICE_URL=http://execution:3006
      - CONFIG_SERVICE_URL=http://config:3007
      - MARKET_SERVICE_URL=http://market-discovery:3001
    depends_on:
      - feature-engine
      - agent-gateway
      - market-discovery
      - risk-service
      - execution
      - config

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: brain-dashboard
    volumes:
      - ./apps/dashboard/src:/app/apps/dashboard/src
      - ./packages/types/src:/app/packages/types/src
    ports:
      - '3100:3100'
    environment:
      - NEXT_PUBLIC_API_URL=http://${LOCAL_IP:-localhost}:3000
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - brain

volumes:
  brain-data:

networks:
  brain:
    driver: bridge
